{% extends "base_premium.html" %}

{% block page_title %}All Users{% endblock %}



{% block content %}
<div class="cardx">
  <table class="table">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Action</th>
    </tr>

    {% for user in users %}
    <tr>
      <td>{{ user[0] }}</td>
      <td>{{ user[1] }}</td>
      <td>{{ user[2] }}</td>
      <td>{{ user[3] }}</td>
      <td>
        
        <a href="/admin/delete_user/{{ user[0] }}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </table>

  <br>
  
  <a href="/dashboard" class="btn btn-outline-light">← Back to Dashboard</a>
</div>
{% endblock %}
