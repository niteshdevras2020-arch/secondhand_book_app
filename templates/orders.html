{% extends "base_premium.html" %}

{% block page_title %}All Orders (Transactions){% endblock %}


{% block content %}
<div class="cardx">
  <table class="table">
    <tr>
      <th>Order ID</th>
      <th>Book Title</th>
      <th>Author</th>
      <th>Price</th>
      <th>Date</th>
    </tr>

    {% for o in orders %}
    <tr>
      <td>{{ o[0] }}</td>
      <td>{{ o[1] }}</td>
      <td>{{ o[2] }}</td>
      <td>{{ o[3] }}</td>
      <td>{{ o[4] }}</td>
    </tr>
    {% endfor %}
  </table>

  <br>
  
  <a href="/back" class="btn btn-outline-light">← Back to Dashboard</a>
</div>
{% endblock %}
